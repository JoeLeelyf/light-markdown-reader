<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkView - Markdown Reader</title>
<meta name="description" content="A beautiful local Markdown reader inspired by Typora">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-sidebar: #f0f2f5;
  --bg-hover: #e8eaed;
  --bg-active: #dce0e4;
  --bg-code: #f6f8fa;
  --bg-code-block: #f8f9fa;
  --bg-blockquote: #f8f9fa;
  --bg-table-header: #f6f8fa;
  --bg-table-stripe: #fafbfc;
  --bg-dropzone: rgba(66,133,244,0.06);
  --text-primary: #1a1a1a;
  --text-secondary: #586069;
  --text-muted: #6e7781;
  --text-link: #0366d6;
  --text-code: #e83e8c;
  --border-color: #e1e4e8;
  --border-light: #eaecef;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --scrollbar-thumb: #c1c1c1;
  --scrollbar-track: transparent;
  --accent: #0366d6;
  --accent-light: #e8f0fe;
  --sidebar-width: 280px;
  --titlebar-height: 38px;
  --toolbar-height: 40px;
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg-primary: #1e1e1e;
  --bg-secondary: #252526;
  --bg-sidebar: #1c1c1e;
  --bg-hover: #2a2d2e;
  --bg-active: #37373d;
  --bg-code: #2d2d2d;
  --bg-code-block: #1e1e1e;
  --bg-blockquote: #252526;
  --bg-table-header: #2d2d2d;
  --bg-table-stripe: #252526;
  --bg-dropzone: rgba(66,133,244,0.1);
  --text-primary: #d4d4d4;
  --text-secondary: #a0a0a0;
  --text-muted: #8b8b8b;
  --text-link: #58a6ff;
  --text-code: #f472b6;
  --border-color: #333333;
  --border-light: #2d2d2d;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
  --scrollbar-thumb: #555;
  --scrollbar-track: transparent;
  --accent: #58a6ff;
  --accent-light: #1c3a5c;
}

/* ===== Theme: Sepia (Warm, Eye-friendly) ===== */
[data-theme="sepia"] {
  --bg-primary: #f4ecd8;
  --bg-secondary: #ebe3cf;
  --bg-sidebar: #e8e0cc;
  --bg-hover: #ddd5c1;
  --bg-active: #d2c9b5;
  --bg-code: #ebe3cf;
  --bg-code-block: #f4ecd8;
  --bg-blockquote: #ebe3cf;
  --bg-table-header: #ebe3cf;
  --bg-table-stripe: #f8f0dc;
  --bg-dropzone: rgba(139,90,43,0.08);
  --text-primary: #5b4636;
  --text-secondary: #704214;
  --text-muted: #8b7355;
  --text-link: #8b4513;
  --text-code: #a0522d;
  --border-color: #d4c4a8;
  --border-light: #e0d4bc;
  --shadow-sm: 0 1px 2px rgba(91,70,54,0.08);
  --shadow-md: 0 2px 8px rgba(91,70,54,0.12);
  --shadow-lg: 0 4px 16px rgba(91,70,54,0.16);
  --scrollbar-thumb: #c4b49a;
  --scrollbar-track: transparent;
  --accent: #8b4513;
  --accent-light: rgba(139,69,19,0.15);
}

/* ===== Theme: Nord (Cool Blue-Gray) ===== */
[data-theme="nord"] {
  --bg-primary: #2e3440;
  --bg-secondary: #3b4252;
  --bg-sidebar: #2a2f3a;
  --bg-hover: #434c5e;
  --bg-active: #4c566a;
  --bg-code: #3b4252;
  --bg-code-block: #2e3440;
  --bg-blockquote: #3b4252;
  --bg-table-header: #3b4252;
  --bg-table-stripe: #343a46;
  --bg-dropzone: rgba(136,192,208,0.1);
  --text-primary: #eceff4;
  --text-secondary: #d8dee9;
  --text-muted: #a3be8c;
  --text-link: #88c0d0;
  --text-code: #a3be8c;
  --border-color: #4c566a;
  --border-light: #3b4252;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.5);
  --scrollbar-thumb: #4c566a;
  --scrollbar-track: transparent;
  --accent: #88c0d0;
  --accent-light: rgba(136,192,208,0.15);
}

/* ===== Theme: Dracula (Purple Dark) ===== */
[data-theme="dracula"] {
  --bg-primary: #282a36;
  --bg-secondary: #44475a;
  --bg-sidebar: #21222c;
  --bg-hover: #44475a;
  --bg-active: #6272a4;
  --bg-code: #44475a;
  --bg-code-block: #282a36;
  --bg-blockquote: #44475a;
  --bg-table-header: #44475a;
  --bg-table-stripe: #2e303e;
  --bg-dropzone: rgba(189,147,249,0.1);
  --text-primary: #f8f8f2;
  --text-secondary: #bd93f9;
  --text-muted: #6272a4;
  --text-link: #8be9fd;
  --text-code: #ff79c6;
  --border-color: #44475a;
  --border-light: #3d3f4e;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.5);
  --scrollbar-thumb: #6272a4;
  --scrollbar-track: transparent;
  --accent: #bd93f9;
  --accent-light: rgba(189,147,249,0.15);
}

/* ===== Theme: Solarized (Classic Contrast) ===== */
[data-theme="solarized"] {
  --bg-primary: #fdf6e3;
  --bg-secondary: #eee8d5;
  --bg-sidebar: #f5eedb;
  --bg-hover: #e4ddc8;
  --bg-active: #d6cfba;
  --bg-code: #eee8d5;
  --bg-code-block: #fdf6e3;
  --bg-blockquote: #eee8d5;
  --bg-table-header: #eee8d5;
  --bg-table-stripe: #f9f2e0;
  --bg-dropzone: rgba(38,139,210,0.08);
  --text-primary: #657b83;
  --text-secondary: #586e75;
  --text-muted: #93a1a1;
  --text-link: #268bd2;
  --text-code: #d33682;
  --border-color: #93a1a1;
  --border-light: #c9c2ae;
  --shadow-sm: 0 1px 2px rgba(101,123,131,0.1);
  --shadow-md: 0 2px 8px rgba(101,123,131,0.15);
  --shadow-lg: 0 4px 16px rgba(101,123,131,0.2);
  --scrollbar-thumb: #93a1a1;
  --scrollbar-track: transparent;
  --accent: #268bd2;
  --accent-light: rgba(38,139,210,0.12);
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #999; }

/* ===== Body ===== */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Title Bar (macOS style) ===== */
.titlebar {
  height: var(--titlebar-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-app-region: drag;
  flex-shrink: 0;
  position: relative;
  user-select: none;
}
.titlebar-text {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}
.titlebar-controls {
  position: absolute;
  left: 14px;
  display: flex;
  gap: 8px;
}
.titlebar-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  cursor: default;
}
.dot-red { background: #ff5f57; }
.dot-yellow { background: #febc2e; }
.dot-green { background: #28c840; }

/* ===== Toolbar ===== */
.toolbar {
  height: var(--toolbar-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 4px;
  flex-shrink: 0;
}
.toolbar-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition);
  white-space: nowrap;
}
.toolbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.toolbar-btn:active { background: var(--bg-active); }
.toolbar-btn.active { background: var(--bg-hover); color: var(--accent); }
.toolbar-btn svg { width: 16px; height: 16px; }
.toolbar-separator {
  width: 1px; height: 20px;
  background: var(--border-color);
  margin: 0 6px;
}
.toolbar-spacer { flex: 1; }
.toolbar-search {
  display: flex;
  align-items: center;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 4px 10px;
  gap: 6px;
  max-width: 220px;
}
.toolbar-search input {
  border: none;
  background: none;
  outline: none;
  color: var(--text-primary);
  font-size: 13px;
  width: 140px;
}
.toolbar-search input::placeholder { color: var(--text-muted); }
.toolbar-search svg { color: var(--text-muted); width: 14px; height: 14px; flex-shrink: 0; }

/* ===== Tab Bar ===== */
.tab-bar {
  height: 34px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  overflow: hidden;
  -webkit-app-region: no-drag;
}
.tab-bar-scroll {
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  overflow-y: hidden;
  flex: 1;
  scrollbar-width: none;
}
.tab-bar-scroll::-webkit-scrollbar { display: none; }
.tab-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  font-size: 12px;
  color: var(--text-secondary);
  background: transparent;
  border: none;
  border-right: 1px solid var(--border-color);
  cursor: pointer;
  white-space: nowrap;
  max-width: 200px;
  min-width: 60px;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  flex-shrink: 0;
  transition: background var(--transition);
}
.tab-item:hover {
  background: var(--bg-hover);
}
.tab-item.active {
  color: var(--text-primary);
  background: var(--bg-primary);
  border-bottom: 2px solid var(--accent);
}
.tab-item-label {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.tab-item-close {
  display: none;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}
.tab-item:hover .tab-item-close,
.tab-item.active .tab-item-close { display: flex; }
.tab-item-close:hover {
  background: var(--bg-active);
  color: var(--text-primary);
}
.tab-item.dragging { opacity: 0.5; }
body.focus-mode .tab-bar { display: none !important; }
body.pdf-export-mode .tab-bar { display: none !important; }
@media print { .tab-bar { display: none !important; } }

/* ===== Split View / Panes ===== */
.panes-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}
.pane {
  flex: 1;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.pane .content-area {
  flex: 1;
  overflow-y: auto;
}
.pane-divider {
  width: 4px;
  cursor: col-resize;
  background: var(--border-color);
  flex-shrink: 0;
  transition: background 0.15s;
  z-index: 2;
}
.pane-divider:hover,
.pane-divider.dragging {
  background: var(--accent);
}
.pane.active-pane {
  outline: none;
}
/* Show subtle indicator for active pane when split */
.panes-container.split .pane.active-pane {
  box-shadow: inset 0 2px 0 0 var(--accent);
}
body.focus-mode .pane-divider { display: none !important; }
body.pdf-export-mode .pane-divider { display: none !important; }
body.pdf-export-mode .pane:not(:first-child) { display: none !important; }
@media print {
  .pane-divider { display: none !important; }
  .pane:not(:first-child) { display: none !important; }
}

/* ===== Main Layout ===== */
.main-container {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: margin-left var(--transition), opacity var(--transition);
  overflow: hidden;
}
.sidebar.hidden {
  margin-left: calc(-1 * var(--sidebar-width));
  opacity: 0;
}
.sidebar-header {
  padding: 14px 16px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.sidebar-tabs {
  display: flex;
  padding: 0 12px;
  gap: 2px;
  flex-shrink: 0;
}
.sidebar-tab {
  flex: 1;
  padding: 6px 0;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.sidebar-tab:hover { color: var(--text-secondary); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

/* TOC */
.toc-item {
  display: block;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--text-secondary);
  text-decoration: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  line-height: 1.5;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.toc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.toc-item[data-level="1"] { padding-left: 12px; font-weight: 600; font-size: 13px; }
.toc-item[data-level="2"] { padding-left: 24px; }
.toc-item[data-level="3"] { padding-left: 36px; font-size: 12px; }
.toc-item[data-level="4"] { padding-left: 48px; font-size: 12px; }
.toc-item[data-level="5"] { padding-left: 60px; font-size: 12px; }
.toc-item[data-level="6"] { padding-left: 72px; font-size: 11px; }

/* File list */
.file-item {
  display: flex;
  align-items: center;
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text-secondary);
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  gap: 8px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.file-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.file-item.active { background: var(--accent-light); color: var(--accent); }
.file-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.file-item-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== Content Area ===== */
.content-area {
  flex: 1;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  scroll-behavior: smooth;
}

/* ===== Drop Zone ===== */
.dropzone {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-dropzone);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.dropzone.active { display: flex; }
.dropzone-box {
  border: 2px dashed var(--accent);
  border-radius: 16px;
  padding: 48px 64px;
  text-align: center;
  background: var(--bg-primary);
  box-shadow: var(--shadow-lg);
}
.dropzone-icon { font-size: 48px; margin-bottom: 12px; color: var(--accent); }
.dropzone-text { font-size: 16px; color: var(--text-secondary); }

/* ===== Welcome Screen ===== */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 20px;
  padding: 40px;
  text-align: center;
}
.welcome-icon {
  width: 80px; height: 80px;
  opacity: 0.3;
}
.welcome h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-secondary);
}
.welcome p {
  font-size: 14px;
  line-height: 1.8;
  max-width: 400px;
}
.welcome-shortcut {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
}
.welcome-shortcut kbd {
  display: inline-block;
  padding: 2px 8px;
  font-size: 12px;
  font-family: -apple-system, sans-serif;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  box-shadow: 0 1px 0 var(--border-color);
  color: var(--text-secondary);
}
.welcome-btn {
  margin-top: 8px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.welcome-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--shadow-md); }

/* ===== Markdown Content ===== */
.markdown-body {
  max-width: 860px;
  width: 100%;
  padding: 40px 60px 120px;
  line-height: 1.75;
  font-size: 16px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Headings */
.markdown-body h1, .markdown-body h2, .markdown-body h3,
.markdown-body h4, .markdown-body h5, .markdown-body h6 {
  margin-top: 1.5em;
  margin-bottom: 0.6em;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-primary);
}
.markdown-body h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-light); }
.markdown-body h2 { font-size: 1.5em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border-light); }
.markdown-body h3 { font-size: 1.25em; }
.markdown-body h4 { font-size: 1.1em; }
.markdown-body h5 { font-size: 1em; }
.markdown-body h6 { font-size: 0.9em; color: var(--text-secondary); }
.markdown-body h1:first-child, .markdown-body h2:first-child { margin-top: 0; }

/* Paragraphs */
.markdown-body p { margin: 0 0 1em; }

/* Links */
.markdown-body a {
  color: var(--text-link);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}
.markdown-body a:hover { border-bottom-color: var(--text-link); }

/* Strong & Em */
.markdown-body strong { font-weight: 600; }
.markdown-body em { font-style: italic; }

/* Lists */
.markdown-body ul, .markdown-body ol {
  margin: 0 0 1em;
  padding-left: 2em;
}
.markdown-body li { margin: 0.25em 0; }
.markdown-body li > p { margin-bottom: 0.5em; }
.markdown-body ul ul, .markdown-body ol ol, .markdown-body ul ol, .markdown-body ol ul {
  margin-bottom: 0;
}

/* Task list */
.markdown-body .task-list-item {
  list-style: none;
  margin-left: -1.5em;
}
.markdown-body .task-list-item input[type="checkbox"] {
  margin-right: 0.5em;
  vertical-align: middle;
  accent-color: var(--accent);
}

/* Blockquote */
.markdown-body blockquote {
  margin: 0 0 1em;
  padding: 0.5em 1em;
  border-left: 4px solid var(--accent);
  background: var(--bg-blockquote);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}
.markdown-body blockquote p:last-child { margin-bottom: 0; }
.markdown-body blockquote blockquote { margin-top: 0.5em; }

/* Code inline */
.markdown-body code:not(pre code) {
  padding: 0.15em 0.4em;
  margin: 0 0.1em;
  font-size: 0.88em;
  background: var(--bg-code);
  border-radius: 4px;
  font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
  color: var(--text-code);
  word-break: break-word;
}

/* Code block */
.markdown-body pre {
  margin: 0 0 1em;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-code-block);
  border: 1px solid var(--border-light);
  position: relative;
}
.markdown-body pre code {
  display: block;
  padding: 16px 20px;
  overflow-x: auto;
  font-size: 13.5px;
  line-height: 1.6;
  font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
  tab-size: 4;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: var(--bg-table-header);
  border-bottom: 1px solid var(--border-light);
  font-size: 12px;
  color: var(--text-muted);
}
.code-lang {
  font-family: "SF Mono", Menlo, monospace;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
}
.code-copy-btn {
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-muted);
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition);
}
.code-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.code-copy-btn.copied { color: #28a745; border-color: #28a745; }

/* Table */
.markdown-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1em;
  font-size: 14px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border-color);
}
.markdown-body thead { background: var(--bg-table-header); }
.markdown-body th, .markdown-body td {
  padding: 10px 16px;
  border: 1px solid var(--border-color);
  text-align: left;
}
.markdown-body th { font-weight: 600; font-size: 13px; }
.markdown-body tbody tr:nth-child(even) { background: var(--bg-table-stripe); }
.markdown-body tbody tr:hover { background: var(--bg-hover); }

/* HR */
.markdown-body hr {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 2em 0;
}

/* Image */
.markdown-body img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  margin: 0.5em 0;
  box-shadow: var(--shadow-sm);
}

/* Mark / Highlight */
.markdown-body mark {
  background: #fff3aa;
  padding: 0.1em 0.3em;
  border-radius: 3px;
}
[data-theme="dark"] .markdown-body mark {
  background: #5c4b00;
  color: #ffd700;
}

/* Footnotes */
.markdown-body .footnotes {
  margin-top: 2em;
  padding-top: 1em;
  border-top: 1px solid var(--border-color);
  font-size: 14px;
  color: var(--text-secondary);
}

/* Definition list (via plugin) */
.markdown-body dl { margin: 0 0 1em; }
.markdown-body dt { font-weight: 600; margin-top: 0.5em; }
.markdown-body dd { margin-left: 2em; color: var(--text-secondary); }

/* Kbd */
.markdown-body kbd {
  display: inline-block;
  padding: 2px 6px;
  font-size: 12px;
  font-family: -apple-system, sans-serif;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  box-shadow: 0 1px 0 var(--border-color);
}

/* Abbr */
.markdown-body abbr {
  text-decoration: underline dotted;
  cursor: help;
}

/* Details/Summary */
.markdown-body details {
  margin: 0 0 1em;
  padding: 8px 16px;
  background: var(--bg-blockquote);
  border-radius: 8px;
  border: 1px solid var(--border-light);
}
.markdown-body summary {
  cursor: pointer;
  font-weight: 500;
  padding: 4px 0;
}
.markdown-body details[open] summary { margin-bottom: 8px; }

/* Math */
.markdown-body .katex-display { margin: 1em 0; overflow-x: auto; }
.markdown-body .math-error {
  background: var(--bg-code-block);
  color: #d32f2f;
  border-left: 3px solid #d32f2f;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 0.9em;
  overflow-x: auto;
}

/* ===== Structured Data View ===== */
.data-view {
  display: none;
  max-width: 860px;
  width: 100%;
  padding: 20px 60px 120px;
  font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
  font-size: 13.5px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
.data-view.active { display: block; }
.data-view-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}
.data-format-badge {
  display: inline-block;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-radius: 4px;
  background: var(--accent-light);
  color: var(--accent);
}
.data-view-stats {
  font-size: 12px;
  color: var(--text-muted);
}

/* JSON Tree */
.json-tree {
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
}
.json-tree details {
  margin: 0;
  padding: 0;
}
.json-tree summary {
  cursor: pointer;
  padding: 2px 0;
  list-style: none;
  display: flex;
  align-items: flex-start;
  gap: 4px;
}
.json-tree summary::-webkit-details-marker { display: none; }
.json-tree summary::before {
  content: '▸';
  display: inline-block;
  width: 14px;
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.json-tree details[open] > summary::before {
  transform: rotate(90deg);
}
.json-tree .json-key {
  color: var(--text-link);
}
.json-tree .json-string {
  color: #0a8f3c;
}
.json-tree .json-number {
  color: #005cc5;
}
.json-tree .json-boolean {
  color: #bf4040;
}
.json-tree .json-null {
  color: var(--text-muted);
  font-style: italic;
}
.json-tree .json-bracket {
  color: var(--text-secondary);
}
.json-tree .json-comma {
  color: var(--text-secondary);
}
.json-tree .json-colon {
  color: var(--text-secondary);
}
.json-tree .json-index {
  color: var(--text-muted);
}
.json-tree .json-preview {
  color: var(--text-muted);
  font-size: 12px;
  overflow-wrap: anywhere;
}
.json-tree .json-line {
  display: block;
  padding: 2px 0;
}
.json-tree .json-children {
  margin-left: 18px;
  padding-left: 12px;
  border-left: 1px solid var(--border-light);
}
.json-tree > .json-node > .json-children {
  margin-left: 0;
}
.json-tree .json-toggle {
  cursor: pointer;
  user-select: none;
}

/* JSONL */
.jsonl-entry {
  margin-bottom: 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-secondary);
}
.jsonl-entry-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: var(--bg-code-block);
  border-bottom: 1px solid var(--border-light);
  font-size: 11px;
  color: var(--text-muted);
}
.jsonl-entry-body {
  padding: 8px 12px;
  font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  font-size: 13px;
  line-height: 1.5;
}
.jsonl-load-more {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  background: var(--bg-secondary);
  border: 1px dashed var(--border-color);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
}
.jsonl-load-more:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Highlighted data block (YAML, TOML, XML) */
.data-highlighted-block {
  border: 1px solid var(--border-color);
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-code-block);
}
.data-highlighted-block pre {
  margin: 0;
  padding: 16px 20px;
  overflow-x: auto;
  font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  font-size: 13.5px;
  line-height: 1.6;
  tab-size: 2;
}
.data-highlighted-block code {
  font-family: inherit;
  font-size: inherit;
}

/* Parquet / CSV Table Styles */
.parquet-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border-color);
  border-radius: 8px;
}
.parquet-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  line-height: 1.5;
}
.parquet-table thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
.parquet-table th {
  background: var(--bg-table-header);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  border-bottom: 2px solid var(--border-color);
  white-space: nowrap;
}
.parquet-table th .pq-type {
  display: block;
  font-weight: 400;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.parquet-table td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border-light);
  max-width: 400px;
  overflow: hidden;
  word-wrap: break-word;
}
.parquet-table .pq-stripe { background: var(--bg-table-stripe); }
.parquet-table .pq-rownum {
  color: var(--text-muted);
  font-size: 11px;
  text-align: right;
  padding-right: 8px;
  min-width: 36px;
  user-select: none;
}
.pq-null { color: var(--text-muted); font-style: italic; }
.pq-bool { color: #d63384; }
.pq-num { color: #0d6efd; }
.pq-media { max-width: 200px; max-height: 150px; border-radius: 4px; display: block; margin: 4px 0; }
.pq-truncated { display: inline; }
.pq-ellipsis { color: var(--text-muted); }
.pq-expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 12px;
  padding: 0 4px;
}
.pq-expand-btn:hover { text-decoration: underline; }

/* PDF export for data view */
body.pdf-export-mode .data-view {
  display: block !important;
  max-width: 100%;
  padding: 40px 50px 40px !important;
}
body.pdf-export-mode .data-view-header {
  page-break-after: avoid;
}
body.pdf-export-mode .jsonl-entry { page-break-inside: avoid; }

/* Source Mode */
.data-view ~ .source-view {
  display: none;
}

/* ===== Source Mode ===== */
.source-view {
  display: none;
  max-width: 860px;
  width: 100%;
  padding: 40px 60px 120px;
}
.source-view.active { display: block; }
.source-view pre {
  font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: var(--text-primary);
  tab-size: 4;
}

/* ===== Word Count Bar ===== */
.status-bar {
  height: 26px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 16px;
  font-size: 11px;
  color: var(--text-secondary);
  gap: 16px;
  flex-shrink: 0;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { position: absolute; z-index: 100; height: calc(100vh - var(--titlebar-height) - var(--toolbar-height) - 26px); }
  .sidebar.hidden { margin-left: calc(-1 * var(--sidebar-width)); }
  .markdown-body { padding: 24px 20px 80px; }
  .source-view { padding: 24px 20px 80px; }
}

/* ===== Screen reader only ===== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* ===== Print ===== */
@media print {
  .titlebar, .toolbar, .sidebar, .status-bar, .dropzone { display: none !important; }
  .content-area { overflow: visible !important; }
  .markdown-body { max-width: 100%; padding: 0; }
  body { background: #fff; color: #000; }
}

/* ===== Focus mode ===== */
body.focus-mode .titlebar,
body.focus-mode .toolbar,
body.focus-mode .sidebar,
body.focus-mode .status-bar { display: none !important; }
body.focus-mode .content-area { height: 100vh; }

/* ===== Native App Mode ===== */
body.native-app .titlebar { display: none !important; }
body.native-app .toolbar { top: 0; }
body.native-app #btnWelcomeOpen { display: none; }
body.native-app .welcome-shortcut { display: none; }
body.native-app .welcome p { margin-bottom: 0; }

/* ===== PDF Export Mode ===== */
body.pdf-export-mode {
  display: block !important;
  height: auto !important;
  overflow: visible !important;
  flex-direction: unset !important;
  min-height: 0 !important;
  background: #fff !important;
  color: #1a1a1a !important;
}
body.pdf-export-mode .titlebar,
body.pdf-export-mode .toolbar,
body.pdf-export-mode .sidebar,
body.pdf-export-mode .status-bar,
body.pdf-export-mode .dropzone,
body.pdf-export-mode .welcome,
body.pdf-export-mode .source-view,
body.pdf-export-mode #fileInput,
body.pdf-export-mode #folderInput { display: none !important; }
body.pdf-export-mode .main-container {
  display: block !important;
  overflow: visible !important;
  height: auto !important;
  min-height: 0 !important;
  flex: none !important;
  position: static !important;
  top: auto !important;
}
body.pdf-export-mode .content-area {
  display: block !important;
  overflow: visible !important;
  height: auto !important;
  min-height: 0 !important;
  flex: none !important;
  justify-content: unset !important;
}
body.pdf-export-mode .markdown-body {
  display: block !important;
  overflow: visible !important;
  height: auto !important;
  max-width: 100%;
  margin: 0;
  padding: 40px 50px 40px !important;
  box-sizing: border-box;
}
body.pdf-export-mode .code-copy-btn { display: none !important; }
/* Page break rules for A4 pagination */
body.pdf-export-mode .markdown-body h1,
body.pdf-export-mode .markdown-body h2,
body.pdf-export-mode .markdown-body h3 { page-break-after: avoid; }
body.pdf-export-mode .markdown-body pre,

body.pdf-export-mode .markdown-body blockquote,
body.pdf-export-mode .markdown-body img { page-break-inside: avoid; }
body.pdf-export-mode .markdown-body p { orphans: 3; widows: 3; }
</style>

<!-- Drop Zone -->
<div class="dropzone" id="dropzone">
  <div class="dropzone-box">
    <div class="dropzone-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="dropzone-text">Drop your Markdown file here</div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".md,.markdown,.mdown,.mkd,.mkdn,.mdx,.txt,.json,.jsonl,.ndjson,.xml,.toml,.yaml,.yml,.parquet,.csv,.tsv" style="display:none">
<input type="file" id="folderInput" webkitdirectory style="display:none">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>

<script>
// ===== State =====
let _tabIdCounter = 0;
function generateId(prefix) { return prefix + '_' + (++_tabIdCounter) + '_' + Date.now().toString(36); }

const state = {
  tabs: [],          // {id, filename, filePath, rawContent, cachedHTML, scrollRatio, sourceMode}
  activeTabId: null,
  sidebarVisible: true,
  focusMode: false,
  files: [],
  theme: localStorage.getItem('markview-theme') || 'light',
  searchVisible: false,
  // Split view (Phase 3)
  panes: [{id: 'pane-0', activeTabId: null}],
  activePaneId: 'pane-0',
};

function getTab(tabId) { return state.tabs.find(t => t.id === tabId); }
function getActiveTab() { return getTab(state.activeTabId); }
function getTabByFilePath(filePath) { return state.tabs.find(t => t.filePath && t.filePath === filePath); }

// ===== Reading Progress Memory =====
const ReadingProgress = {
  STORAGE_KEY: 'markview-reading-progress',
  MAX_ENTRIES: 100,
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}'); }
    catch { return {}; }
  },
  save(fileKey, scrollRatio) {
    if (!fileKey || !isFinite(scrollRatio)) return;
    const all = this.getAll();
    all[fileKey] = { ratio: scrollRatio, timestamp: Date.now() };
    const keys = Object.keys(all);
    if (keys.length > this.MAX_ENTRIES) {
      const sorted = keys.sort((a, b) => (all[a].timestamp || 0) - (all[b].timestamp || 0));
      sorted.slice(0, keys.length - this.MAX_ENTRIES).forEach(k => delete all[k]);
    }
    try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(all)); } catch {}
  },
  load(fileKey) {
    if (!fileKey) return null;
    const all = this.getAll();
    return all[fileKey]?.ratio ?? null;
  },
  clear() { localStorage.removeItem(this.STORAGE_KEY); }
};

// ===== DOM =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const dom = {
  titleText: $('#titleText'),
  sidebar: $('#sidebar'),
  contentArea: $('#contentArea'),
  markdownBody: $('#markdownBody'),
  dataView: $('#dataView'),
  sourceView: $('#sourceView'),
  welcomeScreen: $('#welcomeScreen'),
  outlinePanel: $('#outlinePanel'),
  filesPanel: $('#filesPanel'),
  dropzone: $('#dropzone'),
  fileInput: $('#fileInput'),
  folderInput: $('#folderInput'),
  searchBox: $('#searchBox'),
  searchInput: $('#searchInput'),
  statWords: $('#statWords'),
  statChars: $('#statChars'),
  statLines: $('#statLines'),
  statReadTime: $('#statReadTime'),
  tabBar: $('#tabBar'),
  tabBarScroll: $('#tabBarScroll'),
  panesContainer: $('#panesContainer'),
};

// ===== Native App Detection (must be before any code that uses isNativeApp) =====
const isNativeApp = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.markview;
if (isNativeApp) {
  document.body.classList.add('native-app');
}

// ===== Marked Configuration =====
marked.use({
  gfm: true,
  breaks: false,
  renderer: {
    heading(text, level, raw) {
      const plainText = text.replace(/<[^>]+>/g, '');
      const id = plainText.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/(^-|-$)/g, '');
      return `<h${level} id="${id}">${text}</h${level}>\n`;
    },
    code(code, language, escaped) {
      const lang = language || '';
      let highlighted;
      if (lang && hljs.getLanguage(lang)) {
        try { highlighted = hljs.highlight(code, { language: lang }).value; } catch(e) { highlighted = escapeHtml(code); }
      } else {
        try { highlighted = hljs.highlightAuto(code).value; } catch(e) { highlighted = escapeHtml(code); }
      }
      const langLabel = lang || 'CODE';
      const header = `<div class="code-header"><span class="code-lang">${escapeHtml(langLabel)}</span><button class="code-copy-btn" onclick="copyCode(this)">Copy</button></div>`;
      return `<pre>${header}<code class="hljs language-${escapeHtml(lang)}">${highlighted}</code></pre>\n`;
    },
    listitem(text, task, checked) {
      if (task) {
        const labelText = text.replace(/<[^>]+>/g, '').trim();
        const accessible = text.replace('<input', `<input aria-label="${escapeHtml(labelText)}"`);
        return `<li class="task-list-item">${accessible}</li>\n`;
      }
      return `<li>${text}</li>\n`;
    },
  },
});

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Format Detection =====
const FORMAT_MAP = {
  'json': 'json', 'jsonl': 'jsonl', 'ndjson': 'jsonl',
  'xml': 'xml', 'toml': 'toml',
  'yaml': 'yaml', 'yml': 'yaml',
  'parquet': 'parquet',
  'csv': 'csv', 'tsv': 'tsv',
};

const BINARY_FORMATS = new Set(['parquet']);

function detectFormat(filename) {
  if (!filename) return 'markdown';
  const ext = filename.split('.').pop().toLowerCase();
  return FORMAT_MAP[ext] || 'markdown';
}

function isStructuredFormat(format) {
  return format && format !== 'markdown';
}

function isBinaryFormat(format) {
  return BINARY_FORMATS.has(format);
}

function toFileURL(filePath) {
  if (!filePath) return null;
  try {
    return new URL(filePath).href;
  } catch (e) {
    const normalized = String(filePath).replace(/\\/g, '/');
    const absolutePath = normalized.startsWith('/') ? normalized : `/${normalized}`;
    return `file://${encodeURI(absolutePath)}`;
  }
}

function toLocalFileURL(fileURL) {
  if (!fileURL) return fileURL;
  // Convert file:// URLs to localfile:// for WKWebView custom scheme handler
  if (typeof fileURL === 'string' && fileURL.startsWith('file://')) {
    return 'localfile://' + fileURL.slice('file://'.length);
  }
  return fileURL;
}

function shouldResolveRelativeURL(url) {
  if (!url) return false;
  const value = String(url).trim();
  return value && !/^(?:[a-zA-Z][a-zA-Z\d+.-]*:|\/\/|#)/.test(value);
}

function resolveRelativeURL(url, filePath) {
  if (!filePath || !shouldResolveRelativeURL(url)) return url;
  try {
    const baseURL = new URL('.', toFileURL(filePath));
    const resolved = new URL(url, baseURL).href;
    return toLocalFileURL(resolved);
  } catch (e) {
    return url;
  }
}

function resolveMarkdownAssetURLs(container, filePath) {
  if (!container || !filePath) return;
  container.querySelectorAll('img[src]').forEach((img) => {
    const src = img.getAttribute('src');
    if (src && src.startsWith('file://')) {
      img.setAttribute('src', toLocalFileURL(src));
      return;
    }
    const resolved = resolveRelativeURL(src, filePath);
    if (resolved !== src) {
      img.setAttribute('src', resolved);
    }
  });
}

// ===== Copy Code =====
window.copyCode = function(btn) {
  const code = btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
};

// ===== Tab System =====

function addTab(filename, filePath, content) {
  // Check if tab already exists for this file
  if (filePath) {
    const existing = getTabByFilePath(filePath);
    if (existing) {
      activateTab(existing.id);
      return existing;
    }
  }

  const tab = {
    id: generateId('tab'),
    filename: filename || 'Untitled',
    filePath: filePath || null,
    rawContent: content || '',
    format: detectFormat(filename),
    cachedHTML: null,
    scrollRatio: 0,
    sourceMode: false,
    binaryData: null,
    parquetMeta: null,
  };
  state.tabs.push(tab);
  activateTab(tab.id);
  renderTabBar();
  return tab;
}

function addBinaryTab(filename, filePath, arrayBuffer) {
  if (filePath) {
    const existing = getTabByFilePath(filePath);
    if (existing) {
      activateTab(existing.id);
      return existing;
    }
  }

  const tab = {
    id: generateId('tab'),
    filename: filename || 'Untitled',
    filePath: filePath || null,
    rawContent: '',
    format: detectFormat(filename),
    cachedHTML: null,
    scrollRatio: 0,
    sourceMode: false,
    binaryData: arrayBuffer,
    parquetMeta: null,
  };
  state.tabs.push(tab);
  activateTab(tab.id);
  renderTabBar();
  return tab;
}

function closeTab(tabId) {
  if (!tabId) tabId = state.activeTabId;
  const idx = state.tabs.findIndex(t => t.id === tabId);
  if (idx === -1) return;

  // Save scroll position before closing
  if (tabId === state.activeTabId) {
    saveTabScrollPosition(tabId);
  }

  state.tabs.splice(idx, 1);

  if (state.tabs.length === 0) {
    // No tabs left — show welcome screen
    state.activeTabId = null;
    dom.markdownBody.innerHTML = '';
    dom.markdownBody.style.display = 'none';
    dom.dataView.innerHTML = '';
    dom.dataView.style.display = 'none';
    dom.sourceView.classList.remove('active');
    dom.welcomeScreen.style.display = '';
    dom.titleText.textContent = 'MarkView';
    document.title = 'MarkView';
    dom.outlinePanel.innerHTML = '';
    dom.statWords.textContent = '';
    dom.statChars.textContent = '';
    dom.statLines.textContent = '';
    dom.statReadTime.textContent = '';
    updateTabBarVisibility();
    if (isNativeApp) {
      window.webkit.messageHandlers.markview.postMessage({ action: 'updateTitle', title: 'MarkView' });
    }
    return;
  }

  // Activate neighbor tab
  if (tabId === state.activeTabId) {
    const newIdx = Math.min(idx, state.tabs.length - 1);
    activateTab(state.tabs[newIdx].id);
  }
  renderTabBar();
}

function activateTab(tabId) {
  const tab = getTab(tabId);
  if (!tab) return;

  // Save scroll position of current tab before switching
  if (state.activeTabId && state.activeTabId !== tabId) {
    saveTabScrollPosition(state.activeTabId);
  }

  state.activeTabId = tabId;
  // Update pane tracking
  const pane = state.panes.find(p => p.id === state.activePaneId);
  if (pane) pane.activeTabId = tabId;

  // Update title
  const title = tab.filename + ' - MarkView';
  dom.titleText.textContent = title;
  document.title = title;
  if (isNativeApp) {
    window.webkit.messageHandlers.markview.postMessage({ action: 'updateTitle', title: title });
  }

  // Render content
  if (isStructuredFormat(tab.format)) {
    dom.markdownBody.innerHTML = '';
    dom.markdownBody.style.display = 'none';
    dom.dataView.style.display = 'none';
    dom.welcomeScreen.style.display = 'none';

    if (tab.format === 'parquet' && tab.binaryData) {
      // Parquet: async rendering
      dom.sourceView.querySelector('pre').textContent = '(binary file)';
      dom.sourceView.classList.toggle('active', false);
      $('#btnSource').classList.toggle('active', false);
      if (tab.cachedHTML) {
        dom.dataView.innerHTML = tab.cachedHTML;
        dom.dataView.style.display = 'block';
        updateStructuredStats(tab);
        buildStructuredOutline(tab);
      } else {
        dom.dataView.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Loading Parquet file...</div>';
        dom.dataView.style.display = 'block';
        renderParquetAsync(tab).then(() => {
          if (state.activeTabId === tabId) {
            updateStructuredStats(tab);
            buildStructuredOutline(tab);
          }
        });
      }
      setTimeout(() => restoreTabScrollPosition(tabId), 50);
    } else if (tab.cachedHTML) {
      dom.dataView.innerHTML = tab.cachedHTML;
      dom.dataView.style.display = tab.sourceMode ? 'none' : 'block';
      dom.sourceView.querySelector('pre').textContent = tab.rawContent;
      dom.sourceView.classList.toggle('active', tab.sourceMode);
      $('#btnSource').classList.toggle('active', tab.sourceMode);
      updateStructuredStats(tab);
      buildStructuredOutline(tab);
      setTimeout(() => restoreTabScrollPosition(tabId), 50);
    } else if (tab.rawContent) {
      dom.dataView.innerHTML = renderStructuredData(tab);
      tab.cachedHTML = dom.dataView.innerHTML;
      dom.dataView.style.display = tab.sourceMode ? 'none' : 'block';
      dom.sourceView.querySelector('pre').textContent = tab.rawContent;
      dom.sourceView.classList.toggle('active', tab.sourceMode);
      $('#btnSource').classList.toggle('active', tab.sourceMode);
      updateStructuredStats(tab);
      buildStructuredOutline(tab);
      setTimeout(() => restoreTabScrollPosition(tabId), 50);
    }
  } else if (tab.cachedHTML) {
    dom.dataView.style.display = 'none';
    dom.markdownBody.innerHTML = tab.cachedHTML;
    dom.markdownBody.style.display = tab.sourceMode ? 'none' : 'block';
    dom.welcomeScreen.style.display = 'none';
    dom.sourceView.querySelector('pre').textContent = tab.rawContent;
    dom.sourceView.classList.toggle('active', tab.sourceMode);
    $('#btnSource').classList.toggle('active', tab.sourceMode);
    buildOutline();
    updateStats(tab.rawContent);
    setTimeout(() => restoreTabScrollPosition(tabId), 50);
  } else if (tab.rawContent) {
    renderMarkdown(tab.rawContent);
  } else {
    dom.dataView.style.display = 'none';
    dom.markdownBody.innerHTML = '';
    dom.markdownBody.style.display = 'none';
    dom.welcomeScreen.style.display = '';
  }

  renderTabBar();
}

function renderTabBar() {
  updateTabBarVisibility();
  const scroll = dom.tabBarScroll;
  scroll.innerHTML = '';

  state.tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (tab.id === state.activeTabId ? ' active' : '');
    el.dataset.tabId = tab.id;
    el.draggable = true;

    const label = document.createElement('span');
    label.className = 'tab-item-label';
    label.textContent = tab.filename;
    el.appendChild(label);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-item-close';
    closeBtn.textContent = '\u00d7';
    closeBtn.title = 'Close tab';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(tab.id);
    });
    el.appendChild(closeBtn);

    el.addEventListener('click', () => {
      if (state.activeTabId !== tab.id) activateTab(tab.id);
    });

    // Tab drag for detach
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', tab.id);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
      // Store data for detach detection
      el._dragStartX = e.screenX;
      el._dragStartY = e.screenY;
    });
    el.addEventListener('dragend', (e) => {
      el.classList.remove('dragging');
      // Detect if dragged outside the window (for detach to new window)
      if (state.tabs.length > 1 && isNativeApp) {
        const rect = document.documentElement.getBoundingClientRect();
        if (e.clientX < 0 || e.clientY < 0 || e.clientX > rect.width || e.clientY > rect.height) {
          window.webkit.messageHandlers.markview.postMessage({
            action: 'detachTab',
            filename: tab.filename,
            filePath: tab.filePath || '',
            rawContent: tab.rawContent,
            screenX: e.screenX,
            screenY: e.screenY,
          });
          closeTab(tab.id);
        }
      }
    });

    scroll.appendChild(el);
  });
}

function updateTabBarVisibility() {
  const show = state.tabs.length > 0;
  dom.tabBar.style.display = show ? 'flex' : 'none';
  document.body.classList.toggle('has-tabs', show);
}

function saveTabScrollPosition(tabId) {
  const tab = getTab(tabId);
  if (!tab) return;
  const maxScroll = dom.contentArea.scrollHeight - dom.contentArea.clientHeight;
  tab.scrollRatio = maxScroll > 0 ? dom.contentArea.scrollTop / maxScroll : 0;
  // Also save to ReadingProgress
  if (tab.filePath) {
    ReadingProgress.save(tab.filePath, tab.scrollRatio);
  }
}

function restoreTabScrollPosition(tabId) {
  const tab = getTab(tabId);
  if (!tab) return;

  // Try tab's own scroll ratio first, then ReadingProgress
  let ratio = tab.scrollRatio;
  if ((!ratio || ratio === 0) && tab.filePath) {
    const saved = ReadingProgress.load(tab.filePath);
    if (saved !== null) ratio = saved;
  }

  if (ratio > 0 && isFinite(ratio)) {
    const maxScroll = dom.contentArea.scrollHeight - dom.contentArea.clientHeight;
    dom.contentArea.scrollTop = ratio * maxScroll;
  }
}

// ===== Render Markdown =====
function renderMarkdown(content) {
  const tab = getActiveTab();
  if (tab) tab.rawContent = content;

  // Hide data view to prevent stale display
  dom.dataView.style.display = 'none';
  dom.dataView.innerHTML = '';
  const html = renderMarkdownToHTML(content, tab ? tab.filePath : null);

  dom.markdownBody.innerHTML = html;
  dom.markdownBody.style.display = 'block';
  dom.welcomeScreen.style.display = 'none';

  // Cache rendered HTML on the tab
  if (tab) tab.cachedHTML = html;

  // Source view
  dom.sourceView.querySelector('pre').textContent = content;

  // Apply source mode from tab
  if (tab) {
    dom.sourceView.classList.toggle('active', tab.sourceMode);
    dom.markdownBody.style.display = tab.sourceMode ? 'none' : 'block';
    $('#btnSource').classList.toggle('active', tab.sourceMode);
  }

  buildOutline();
  updateStats(content);

  // Restore reading progress
  setTimeout(() => {
    if (tab) restoreTabScrollPosition(tab.id);
  }, 100);
}

// ===== Build Outline =====
function buildOutline() {
  const headings = dom.markdownBody.querySelectorAll('h1,h2,h3,h4,h5,h6');
  dom.outlinePanel.innerHTML = '';
  if (headings.length === 0) {
    dom.outlinePanel.innerHTML = '<p style="padding:16px;font-size:13px;color:var(--text-muted)">No headings found</p>';
    return;
  }
  headings.forEach((h, i) => {
    const level = parseInt(h.tagName[1]);
    const btn = document.createElement('button');
    btn.className = 'toc-item';
    btn.dataset.level = level;
    btn.textContent = h.textContent;
    btn.addEventListener('click', () => {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      $$('.toc-item').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    });
    dom.outlinePanel.appendChild(btn);
  });
}

// ===== Update Stats =====
function updateStats(text) {
  const lines = text.split('\n').length;
  const chars = text.length;
  const cjk = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
  const latin = (text.match(/[a-zA-Z]+/g) || []).length;
  const words = cjk + latin;
  const readTime = Math.max(1, Math.round(words / 250));
  dom.statWords.textContent = `${words} words`;
  dom.statChars.textContent = `${chars} chars`;
  dom.statLines.textContent = `${lines} lines`;
  dom.statReadTime.textContent = `~${readTime} min read`;
}

// ===== Scroll Spy for Outline + Reading Progress =====
let scrollSaveTimeout = null;
dom.contentArea.addEventListener('scroll', () => {
  const scrollTop = dom.contentArea.scrollTop;

  // Save reading progress for ALL formats (debounced)
  if (scrollSaveTimeout) clearTimeout(scrollSaveTimeout);
  scrollSaveTimeout = setTimeout(() => {
    const tab = getActiveTab();
    if (tab) {
      const maxScroll = dom.contentArea.scrollHeight - dom.contentArea.clientHeight;
      const ratio = maxScroll > 0 ? scrollTop / maxScroll : 0;
      tab.scrollRatio = ratio;
      if (tab.filePath) ReadingProgress.save(tab.filePath, ratio);
    }
  }, 300);

  // Heading scroll spy only for markdown tabs
  const activeTab = getActiveTab();
  if (activeTab && isStructuredFormat(activeTab.format)) return;

  const headings = dom.markdownBody.querySelectorAll('h1,h2,h3,h4,h5,h6');
  const tocItems = $$('.toc-item');
  if (headings.length === 0) return;

  let activeIdx = 0;
  headings.forEach((h, i) => {
    if (h.offsetTop - 80 <= scrollTop) activeIdx = i;
  });
  tocItems.forEach(t => t.classList.remove('active'));
  if (tocItems[activeIdx]) {
    tocItems[activeIdx].classList.add('active');
    tocItems[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

// ===== File Handling =====
function openFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const format = FORMAT_MAP[ext] || 'markdown';
  if (isBinaryFormat(format)) {
    const reader = new FileReader();
    reader.onload = (e) => {
      addBinaryTab(file.name, null, e.target.result);
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader = new FileReader();
    reader.onload = (e) => {
      addTab(file.name, null, e.target.result);
    };
    reader.readAsText(file);
  }
}

dom.fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) openFile(e.target.files[0]);
  e.target.value = '';
});

dom.folderInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files).filter(f =>
    /\.(md|markdown|mdown|mkd|mkdn|mdx|txt|json|jsonl|ndjson|xml|toml|yaml|yml|parquet|csv|tsv)$/i.test(f.name)
  ).sort((a, b) => a.name.localeCompare(b.name));

  state.files = files;
  renderFileList(files);

  $$('.sidebar-tab').forEach(t => t.classList.remove('active'));
  $$('.sidebar-tab')[1].classList.add('active');
  dom.outlinePanel.style.display = 'none';
  dom.filesPanel.style.display = 'block';

  if (files.length > 0) openFile(files[0]);
  e.target.value = '';
});

function renderFileList(files) {
  dom.filesPanel.innerHTML = '';
  files.forEach((file, i) => {
    const btn = document.createElement('button');
    btn.className = 'file-item' + (i === 0 ? ' active' : '');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="file-item-name">${file.name}</span>
    `;
    btn.addEventListener('click', () => {
      $$('.file-item').forEach(f => f.classList.remove('active'));
      btn.classList.add('active');
      openFile(file);
    });
    dom.filesPanel.appendChild(btn);
  });
}

// ===== Drag & Drop =====
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  // Ignore internal tab drags
  if (e.dataTransfer.types.includes('text/plain')) return;
  e.preventDefault();
  dragCounter++;
  dom.dropzone.classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  if (e.dataTransfer.types.includes('text/plain')) return;
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dom.dropzone.classList.remove('active');
  }
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dom.dropzone.classList.remove('active');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    const mdFile = Array.from(files).find(f => /\.(md|markdown|mdown|mkd|txt|mdx|json|jsonl|ndjson|xml|toml|yaml|yml|parquet|csv|tsv)$/i.test(f.name));
    if (mdFile) openFile(mdFile);
  }
});

const THEMES = ['light', 'dark', 'sepia', 'nord', 'dracula', 'solarized'];
const DARK_THEMES = ['dark', 'nord', 'dracula'];

function cycleTheme() {
  const currentIdx = THEMES.indexOf(state.theme);
  const nextIdx = (currentIdx + 1) % THEMES.length;
  state.theme = THEMES[nextIdx];
  applyTheme();
}

function setTheme(themeName) {
  if (THEMES.includes(themeName)) {
    state.theme = themeName;
    applyTheme();
  }
}

function applyTheme() {
  document.documentElement.dataset.theme = state.theme;
  try { localStorage.setItem('markview-theme', state.theme); } catch {}
  const isDark = DARK_THEMES.includes(state.theme);
  $('#iconSun').style.display = isDark ? 'none' : 'block';
  $('#iconMoon').style.display = isDark ? 'block' : 'none';
  $('#hljs-light').disabled = isDark;
  $('#hljs-dark').disabled = !isDark;
  // Notify Swift for cross-window theme sync
  if (isNativeApp) {
    window.webkit.messageHandlers.markview.postMessage({ action: 'themeChanged', theme: state.theme });
  }
}

dom.searchInput.addEventListener('input', (e) => {
  const query = e.target.value.trim();
  if (!query) { clearHighlight(); return; }
  highlightSearch(query);
});

function highlightSearch(query) {
  clearHighlight();
  if (!query) return;
  const walker = document.createTreeWalker(dom.markdownBody, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  nodes.forEach(node => {
    if (regex.test(node.textContent)) {
      const span = document.createElement('span');
      span.innerHTML = node.textContent.replace(regex, '<mark>$1</mark>');
      node.parentNode.replaceChild(span, node);
    }
  });
}

function clearHighlight() {
  dom.markdownBody.querySelectorAll('mark').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
}

function toggleSplitView(direction) {
  const container = dom.panesContainer;
  if (container.classList.contains('split')) {
    closeSplitView();
    return;
  }

  // Create second pane
  const paneId = generateId('pane');
  state.panes.push({ id: paneId, activeTabId: null });

  const paneEl = document.createElement('div');
  paneEl.className = 'pane';
  paneEl.id = paneId;
  paneEl.dataset.paneId = paneId;

  // Create content area structure for the new pane
  const contentArea = document.createElement('div');
  contentArea.className = 'content-area';

  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.innerHTML = '<h2>Split Pane</h2><p>Click a tab to display it here, or open a new file.</p>';
  contentArea.appendChild(welcome);

  const mdBody = document.createElement('div');
  mdBody.className = 'markdown-body';
  mdBody.style.display = 'none';
  contentArea.appendChild(mdBody);

  const dv = document.createElement('div');
  dv.className = 'data-view';
  dv.style.display = 'none';
  contentArea.appendChild(dv);

  const srcView = document.createElement('div');
  srcView.className = 'source-view';
  srcView.innerHTML = '<pre></pre>';
  contentArea.appendChild(srcView);

  paneEl.appendChild(contentArea);

  // Create divider
  const divider = document.createElement('div');
  divider.className = 'pane-divider';
  initPaneDividerDrag(divider);

  container.appendChild(divider);
  container.appendChild(paneEl);
  container.classList.add('split');
  $('#btnSplit').classList.add('active');

  // Click handler for pane focus
  paneEl.addEventListener('mousedown', () => setActivePane(paneId));

  // If there's a second tab, display it in the new pane
  if (state.tabs.length > 1) {
    const currentTabId = state.activeTabId;
    const otherTab = state.tabs.find(t => t.id !== currentTabId);
    if (otherTab) {
      renderTabInPane(otherTab, paneEl);
      state.panes[state.panes.length - 1].activeTabId = otherTab.id;
    }
  }
}

function closeSplitView() {
  const container = dom.panesContainer;
  // Remove all panes except the first
  const dividers = container.querySelectorAll('.pane-divider');
  dividers.forEach(d => d.remove());
  const panes = container.querySelectorAll('.pane');
  panes.forEach((p, i) => { if (i > 0) p.remove(); });

  container.classList.remove('split');
  state.panes = [state.panes[0]];
  state.activePaneId = state.panes[0].id;
  $('#btnSplit').classList.remove('active');

  // Ensure the first pane is active
  const firstPane = container.querySelector('.pane');
  if (firstPane) firstPane.classList.add('active-pane');
}

function setActivePane(paneId) {
  state.activePaneId = paneId;
  const container = dom.panesContainer;
  container.querySelectorAll('.pane').forEach(p => {
    p.classList.toggle('active-pane', p.dataset.paneId === paneId);
  });
  // Update outline for the active pane's content
  const pane = state.panes.find(p => p.id === paneId);
  if (pane && pane.activeTabId) {
    const tab = getTab(pane.activeTabId);
    if (tab) {
      state.activeTabId = tab.id;
      renderTabBar();
      // Rebuild outline from the active pane's markdown body
      const paneEl = document.getElementById(paneId);
      if (paneEl) {
        const mdBody = paneEl.querySelector('.markdown-body');
        if (mdBody) {
          buildOutlineFromElement(mdBody);
        }
      }
    }
  }
}

function renderTabInPane(tab, paneEl) {
  const contentArea = paneEl.querySelector('.content-area');
  const mdBody = paneEl.querySelector('.markdown-body');
  const srcView = paneEl.querySelector('.source-view');
  const welcome = paneEl.querySelector('.welcome');

  // Ensure this pane has a dataView
  let dataView = paneEl.querySelector('.data-view');
  if (!dataView) {
    dataView = document.createElement('div');
    dataView.className = 'data-view';
    mdBody.parentNode.insertBefore(dataView, srcView);
  }

  if (isStructuredFormat(tab.format)) {
    mdBody.style.display = 'none';
    if (tab.format === 'parquet' && tab.binaryData) {
      if (tab.cachedHTML) {
        dataView.innerHTML = tab.cachedHTML;
      } else {
        dataView.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Loading Parquet...</div>';
        renderParquetAsync(tab).then(() => {
          if (tab.cachedHTML) dataView.innerHTML = tab.cachedHTML;
        });
      }
    } else if (tab.cachedHTML) {
      dataView.innerHTML = tab.cachedHTML;
    } else if (tab.rawContent) {
      dataView.innerHTML = renderStructuredData(tab);
      tab.cachedHTML = dataView.innerHTML;
    }
    dataView.style.display = tab.sourceMode ? 'none' : 'block';
    if (welcome) welcome.style.display = 'none';
  } else if (tab.cachedHTML) {
    dataView.style.display = 'none';
    mdBody.innerHTML = tab.cachedHTML;
    mdBody.style.display = 'block';
    if (welcome) welcome.style.display = 'none';
  } else if (tab.rawContent) {
    dataView.style.display = 'none';
    mdBody.innerHTML = renderMarkdownToHTML(tab.rawContent, tab.filePath);
    tab.cachedHTML = mdBody.innerHTML;
    mdBody.style.display = 'block';
    if (welcome) welcome.style.display = 'none';
  }
  srcView.querySelector('pre').textContent = tab.rawContent || '';
  srcView.classList.toggle('active', tab.sourceMode);
  if (isStructuredFormat(tab.format)) {
    dataView.style.display = tab.sourceMode ? 'none' : 'block';
  } else {
    mdBody.style.display = tab.sourceMode ? 'none' : 'block';
  }
}

function renderMarkdownToHTML(content, filePath) {
  let processed = content;
  const mathBlocks = [];
  const mathNonce = Math.random().toString(36).slice(2, 10);
  processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (match, math) => {
    const idx = mathBlocks.length;
    mathBlocks.push({ type: 'block', content: math });
    return `%%MATH_BLOCK_${mathNonce}_${idx}%%`;
  });
  processed = processed.replace(/(?<![\\$])\$(?!\$)(.+?)(?<![\\$])\$/g, (match, math) => {
    const idx = mathBlocks.length;
    mathBlocks.push({ type: 'inline', content: math });
    return `%%MATH_INLINE_${mathNonce}_${idx}%%`;
  });
  let html = marked.parse(processed);
  mathBlocks.forEach((block, idx) => {
    const content = block.content.trim();
    if (block.type === 'block') {
      if (!content) {
        html = html.replace(`%%MATH_BLOCK_${mathNonce}_${idx}%%`, '');
        return;
      }
      try {
        const rendered = katex.renderToString(content, { displayMode: true, throwOnError: false });
        html = html.replace(`%%MATH_BLOCK_${mathNonce}_${idx}%%`, rendered);
      } catch(e) {
        html = html.replace(`%%MATH_BLOCK_${mathNonce}_${idx}%%`, `<pre class="math-error">${escapeHtml(block.content)}</pre>`);
      }
    } else {
      if (!content) {
        html = html.replace(`%%MATH_INLINE_${mathNonce}_${idx}%%`, '');
        return;
      }
      try {
        const rendered = katex.renderToString(content, { displayMode: false, throwOnError: false });
        html = html.replace(`%%MATH_INLINE_${mathNonce}_${idx}%%`, rendered);
      } catch(e) {
        html = html.replace(`%%MATH_INLINE_${mathNonce}_${idx}%%`, `<code>${escapeHtml(block.content)}</code>`);
      }
    }
  });
  if (!filePath) return html;

  const template = document.createElement('template');
  template.innerHTML = html;
  resolveMarkdownAssetURLs(template.content, filePath);
  return template.innerHTML;
}

// ===== Structured Data Renderers =====

function renderStructuredData(tab) {
  try {
    switch (tab.format) {
      case 'json': return renderJSON(tab.rawContent);
      case 'jsonl': return renderJSONL(tab.rawContent);
      case 'xml': return renderXML(tab.rawContent);
      case 'yaml': return renderHighlightedData(tab.rawContent, 'yaml', 'YAML');
      case 'toml': return renderHighlightedData(tab.rawContent, 'ini', 'TOML');
      case 'csv': return renderCSV(tab.rawContent, 'csv');
      case 'tsv': return renderCSV(tab.rawContent, 'tsv');
      case 'parquet': return null; // handled async
      default: return null;
    }
  } catch (e) {
    return `<div style="color:var(--text-secondary);padding:20px;">
      <p><strong>Failed to parse ${escapeHtml(tab.format)}:</strong> ${escapeHtml(e.message)}</p>
      <pre style="margin-top:12px;padding:16px;background:var(--bg-code-block);border-radius:8px;overflow-x:auto;">${escapeHtml(tab.rawContent.substring(0, 2000))}${tab.rawContent.length > 2000 ? '\n... (truncated)' : ''}</pre>
    </div>`;
  }
}

function renderJSON(content) {
  // Large file fallback: >5MB
  if (content.length > 5 * 1024 * 1024) {
    return `<div class="data-view-header"><span class="data-format-badge">JSON</span></div>` +
      renderHighlightedData(content, 'json', 'JSON');
  }

  const data = JSON.parse(content);
  const stats = getJSONStats(data);
  const batchSize = 100;

  let html = `<div class="data-view-header"><span class="data-format-badge">JSON</span><span class="data-view-stats">${escapeHtml(stats)}</span></div>`;

  // Lazy-load top-level arrays/objects with >100 items
  const isLargeArray = Array.isArray(data) && data.length > batchSize;
  const isLargeObject = !Array.isArray(data) && data && typeof data === 'object' && Object.keys(data).length > batchSize;

  if (isLargeArray) {
    const total = data.length;
    const initialCount = Math.min(batchSize, total);
    html += '<div class="json-tree"><details class="json-node" open><summary>';
    html += `<span class="json-bracket">[</span><span class="json-number">${total}</span><span class="json-bracket">]</span>`;
    const preview = data.slice(0, 3).map(v => jsonPreview(v)).join(', ');
    const suffix = total > 3 ? ', …' : '';
    html += `<span class="json-preview">${preview}${suffix}</span></summary>`;
    html += '<div class="json-children" id="jsonLazyContainer">';
    for (let i = 0; i < initialCount; i++) {
      html += jsonToTree(data[i], i, 1, false, 'index');
    }
    html += '</div></details></div>';
    if (total > batchSize) {
      html += `<button class="jsonl-load-more" id="jsonLoadMore" data-offset="${batchSize}" data-total="${total}" data-kind="array">Load more (${batchSize} / ${total})</button>`;
    }
  } else if (isLargeObject) {
    const entries = Object.entries(data);
    const total = entries.length;
    const initialCount = Math.min(batchSize, total);
    html += '<div class="json-tree"><details class="json-node" open><summary>';
    html += `<span class="json-bracket">{</span><span class="json-number">${total}</span><span class="json-bracket">}</span>`;
    const previewKeys = entries.slice(0, 3).map(([k]) => `"${escapeHtml(k)}"`).join(', ');
    const suffix = total > 3 ? ', …' : '';
    html += `<span class="json-preview">${previewKeys}${suffix}</span></summary>`;
    html += '<div class="json-children" id="jsonLazyContainer">';
    for (let i = 0; i < initialCount; i++) {
      html += jsonToTree(entries[i][1], entries[i][0], 1, false);
    }
    html += '</div></details></div>';
    if (total > batchSize) {
      html += `<button class="jsonl-load-more" id="jsonLoadMore" data-offset="${batchSize}" data-total="${total}" data-kind="object">Load more (${batchSize} / ${total})</button>`;
    }
  } else {
    html += '<div class="json-tree">';
    html += jsonToTree(data, '', 0, true);
    html += '</div>';
  }

  return html;
}

function getJSONStats(data) {
  if (Array.isArray(data)) return `Array with ${data.length} items`;
  if (data && typeof data === 'object') return `Object with ${Object.keys(data).length} keys`;
  return 'JSON value';
}

function formatJSONKey(key, keyKind) {
  if (key === '' || key === null || key === undefined) return '';
  if (keyKind === 'index') {
    return `<span class="json-index">[${escapeHtml(String(key))}]</span><span class="json-colon">:</span> `;
  }
  return `<span class="json-key">"${escapeHtml(String(key))}"</span><span class="json-colon">:</span> `;
}

function renderJSONPrimitive(data, key, keyKind) {
  const keyStr = formatJSONKey(key, keyKind);
  if (data === null) {
    return `<div class="json-line">${keyStr}<span class="json-null">null</span></div>`;
  }
  if (typeof data === 'boolean') {
    return `<div class="json-line">${keyStr}<span class="json-boolean">${data}</span></div>`;
  }
  if (typeof data === 'number') {
    return `<div class="json-line">${keyStr}<span class="json-number">${data}</span></div>`;
  }
  if (typeof data === 'string') {
    const display = data.length > 200 ? escapeHtml(data.substring(0, 200)) + '<span style="color:var(--text-muted)">…</span>' : escapeHtml(data);
    return `<div class="json-line">${keyStr}<span class="json-string">"${display}"</span></div>`;
  }
  return null;
}

function jsonToTree(data, key, depth, isRoot, keyKind = 'property') {
  const primitive = renderJSONPrimitive(data, key, keyKind);
  if (primitive) return primitive;

  if (Array.isArray(data)) {
    const keyStr = formatJSONKey(key, keyKind);
    if (data.length === 0) {
      return `<div class="json-line">${keyStr}<span class="json-bracket">[]</span></div>`;
    }

    const isCollapsed = depth >= 1 && !isRoot;
    const detailsAttrs = isCollapsed ? '' : 'open';
    const preview = data.slice(0, 3).map(v => jsonPreview(v)).join(', ');
    const suffix = data.length > 3 ? ', …' : '';

    let html = `<details class="json-node" ${detailsAttrs}><summary>${keyStr}<span class="json-bracket">[</span>`;
    html += `<span class="json-number">${data.length}</span><span class="json-bracket">]</span>`;
    html += `<span class="json-preview">${preview}${suffix}</span></summary>`;
    html += '<div class="json-children">';
    data.forEach((item, i) => {
      html += jsonToTree(item, i, depth + 1, false, 'index');
    });
    html += '</div></details>';
    return html;
  }

  if (typeof data === 'object') {
    const entries = Object.entries(data);
    const keyStr = formatJSONKey(key, keyKind);
    if (entries.length === 0) {
      return `<div class="json-line">${keyStr}<span class="json-bracket">{}</span></div>`;
    }

    const isCollapsed = depth >= 1 && !isRoot;
    const detailsAttrs = isCollapsed ? '' : 'open';
    const previewKeys = entries.slice(0, 3).map(([k]) => k).map(k => `"${escapeHtml(k)}"`).join(', ');
    const suffix = entries.length > 3 ? ', …' : '';

    let html = `<details class="json-node" ${detailsAttrs}><summary>${keyStr}<span class="json-bracket">{</span>`;
    html += `<span class="json-number">${entries.length}</span><span class="json-bracket">}</span>`;
    html += `<span class="json-preview">${previewKeys}${suffix}</span></summary>`;
    html += '<div class="json-children">';
    entries.forEach(([k, v]) => {
      html += jsonToTree(v, k, depth + 1, false);
    });
    html += '</div></details>';
    return html;
  }

  return `<div class="json-line">${formatJSONKey(key, keyKind)}${escapeHtml(String(data))}</div>`;
}

function jsonPreview(val) {
  if (val === null) return 'null';
  if (typeof val === 'boolean') return String(val);
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') return `"${val.length > 30 ? escapeHtml(val.substring(0, 30)) + '…' : escapeHtml(val)}"`;
  if (Array.isArray(val)) return `Array(${val.length})`;
  if (typeof val === 'object') return `{${Object.keys(val).length}}`;
  return String(val);
}

function getJSONLRecords(content) {
  return content.split(/\r?\n/).reduce((records, line, index) => {
    if (line.trim()) {
      records.push({ line, lineNumber: index + 1 });
    }
    return records;
  }, []);
}

function renderJSONL(content) {
  const records = getJSONLRecords(content);
  const total = records.length;

  let html = `<div class="data-view-header"><span class="data-format-badge">JSONL</span><span class="data-view-stats">${total} entries</span></div>`;
  html += '<div id="jsonlContainer">';

  const batchSize = 100;
  const initialCount = Math.min(batchSize, records.length);

  for (let i = 0; i < initialCount; i++) {
    html += renderJSONLEntry(records[i].line, records[i].lineNumber);
  }

  html += '</div>';

  if (records.length > batchSize) {
    html += `<button class="jsonl-load-more" id="jsonlLoadMore" data-offset="${batchSize}" data-total="${total}">Load more (${batchSize} / ${total})</button>`;
  }

  return html;
}

function renderJSONLEntry(line, lineNum) {
  let body = '';
  try {
    const data = JSON.parse(line);
    body = '<div class="json-tree">' + jsonToTree(data, '', 0, true) + '</div>';
  } catch (e) {
    body = `<pre style="margin:0;white-space:pre-wrap;word-break:break-all;color:var(--text-muted)">${escapeHtml(line)}</pre>`;
  }
  return `<div class="jsonl-entry">
    <div class="jsonl-entry-header"><span>Line ${lineNum}</span></div>
    <div class="jsonl-entry-body">${body}</div>
  </div>`;
}

function renderXML(content) {
  // Simple XML formatter
  const formatted = formatXML(content);
  const lines = formatted.split('\n');
  let html = `<div class="data-view-header"><span class="data-format-badge">XML</span><span class="data-view-stats">${lines.length} lines</span></div>`;
  try {
    const highlighted = hljs.highlight(formatted, { language: 'xml' }).value;
    html += `<div class="data-highlighted-block"><pre><code class="hljs language-xml">${highlighted}</code></pre></div>`;
  } catch (e) {
    html += `<div class="data-highlighted-block"><pre><code>${escapeHtml(formatted)}</code></pre></div>`;
  }
  return html;
}

function formatXML(xml) {
  let formatted = '';
  let indent = 0;
  const tab = '  ';
  // Remove existing whitespace between tags
  xml = xml.replace(/(>)\s*(<)/g, '$1\n$2');
  const lines = xml.split('\n');

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    // Closing tag
    if (line.startsWith('</')) {
      indent = Math.max(0, indent - 1);
      formatted += tab.repeat(indent) + line + '\n';
    }
    // Self-closing tag or processing instruction or comment
    else if (line.endsWith('/>') || line.startsWith('<?') || line.startsWith('<!')) {
      formatted += tab.repeat(indent) + line + '\n';
    }
    // Opening tag (no closing on same line)
    else if (line.startsWith('<') && !line.startsWith('</')) {
      formatted += tab.repeat(indent) + line + '\n';
      if (!line.includes('</')) indent++;
    }
    // Text content
    else {
      formatted += tab.repeat(indent) + line + '\n';
    }
  }
  return formatted.trim();
}

function renderHighlightedData(content, lang, name) {
  const lines = content.split('\n');
  let html = `<div class="data-view-header"><span class="data-format-badge">${escapeHtml(name)}</span><span class="data-view-stats">${lines.length} lines</span></div>`;
  try {
    if (hljs.getLanguage(lang)) {
      const highlighted = hljs.highlight(content, { language: lang }).value;
      html += `<div class="data-highlighted-block"><pre><code class="hljs language-${lang}">${highlighted}</code></pre></div>`;
    } else {
      html += `<div class="data-highlighted-block"><pre><code>${escapeHtml(content)}</code></pre></div>`;
    }
  } catch (e) {
    html += `<div class="data-highlighted-block"><pre><code>${escapeHtml(content)}</code></pre></div>`;
  }
  return html;
}

function updateStructuredStats(tab) {
  if (!tab || !isStructuredFormat(tab.format)) {
    dom.statWords.textContent = '';
    dom.statChars.textContent = '';
    dom.statLines.textContent = '';
    dom.statReadTime.textContent = '';
    return;
  }
  if (tab.format === 'parquet') {
    const size = tab.binaryData ? tab.binaryData.byteLength : 0;
    const sizeStr = size > 1024 * 1024 ? (size / (1024 * 1024)).toFixed(1) + ' MB' :
                    size > 1024 ? (size / 1024).toFixed(1) + ' KB' : size + ' B';
    dom.statWords.textContent = 'PARQUET';
    dom.statChars.textContent = sizeStr;
    dom.statLines.textContent = tab.parquetMeta ? `${tab.parquetMeta.totalRows} rows` : '';

  dom.statReadTime.textContent = '';
}

// JSON "Load more" button handler
document.addEventListener('click', (e) => {

    const total = parseInt(btn.dataset.total);
    const kind = btn.dataset.kind;
    const batchSize = 100;
